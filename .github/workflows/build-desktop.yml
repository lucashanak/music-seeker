name: Build Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: macos-rust-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: macos-rust-

      - name: Generate icons
        run: |
          cd desktop/src-tauri/icons
          # macOS has sips built-in, no brew install needed
          # First convert SVG to base PNG via built-in python
          python3 -c "
          import subprocess, os
          sizes = [32, 128, 256, 512, 1024]
          # Use cairosvg if available, otherwise try rsvg
          try:
              import cairosvg
              for s in sizes:
                  cairosvg.svg2png(url='icon.svg', write_to=f'icon_{s}.png', output_width=s, output_height=s)
          except ImportError:
              # Fallback: install and use rsvg-convert via brew (cached)
              os.system('brew install librsvg')
              for s in sizes:
                  os.system(f'rsvg-convert -w {s} -h {s} icon.svg > icon_{s}.png')
          "
          cp icon_512.png icon.png
          mkdir -p icon.iconset
          cp icon_32.png icon.iconset/icon_16x16@2x.png
          cp icon_128.png icon.iconset/icon_128x128.png
          cp icon_256.png icon.iconset/icon_128x128@2x.png
          cp icon_256.png icon.iconset/icon_256x256.png
          cp icon_512.png icon.iconset/icon_256x256@2x.png
          cp icon_512.png icon.iconset/icon_512x512.png
          cp icon_1024.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build Tauri app
        working-directory: desktop
        run: npx tauri build

      - name: Rename DMG
        run: |
          cd desktop/src-tauri/target/release/bundle/dmg
          for f in *.dmg; do mv "$f" "MusicSeeker.dmg"; done

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicSeeker-macOS
          path: desktop/src-tauri/target/release/bundle/dmg/MusicSeeker.dmg

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/release/bundle/dmg/MusicSeeker.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: android-rust-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: android-rust-

      - name: Generate icons
        run: |
          sudo apt-get install -y librsvg2-bin
          cd desktop/src-tauri/icons
          for size in 32 48 72 96 128 144 192 256 512; do
            rsvg-convert -w $size -h $size icon.svg > icon_${size}.png
          done
          cp icon_512.png icon.png

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Init Android project
        working-directory: desktop
        run: npx tauri android init

      - name: Set Android app icon
        run: |
          GEN="desktop/src-tauri/gen/android"
          ICONS="desktop/src-tauri/icons"
          RES="$GEN/app/src/main/res"

          # Replace default icons in mipmap directories
          cp "$ICONS/icon_48.png"  "$RES/mipmap-mdpi/ic_launcher.png"
          cp "$ICONS/icon_72.png"  "$RES/mipmap-hdpi/ic_launcher.png"
          cp "$ICONS/icon_96.png"  "$RES/mipmap-xhdpi/ic_launcher.png"
          cp "$ICONS/icon_144.png" "$RES/mipmap-xxhdpi/ic_launcher.png"
          cp "$ICONS/icon_192.png" "$RES/mipmap-xxxhdpi/ic_launcher.png"

          # Round icons (same as regular for our rounded-rect SVG)
          cp "$ICONS/icon_48.png"  "$RES/mipmap-mdpi/ic_launcher_round.png"
          cp "$ICONS/icon_72.png"  "$RES/mipmap-hdpi/ic_launcher_round.png"
          cp "$ICONS/icon_96.png"  "$RES/mipmap-xhdpi/ic_launcher_round.png"
          cp "$ICONS/icon_144.png" "$RES/mipmap-xxhdpi/ic_launcher_round.png"
          cp "$ICONS/icon_192.png" "$RES/mipmap-xxxhdpi/ic_launcher_round.png"

      - name: Patch Android project
        run: |
          GEN="desktop/src-tauri/gen/android"

          # 1. Add permissions to AndroidManifest.xml
          MANIFEST="$GEN/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \
              <uses-permission android:name="android.permission.INTERNET" />\
              <uses-permission android:name="android.permission.RECORD_AUDIO" />\
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\
              <uses-permission android:name="android.permission.WAKE_LOCK" />\
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' "$MANIFEST"

          # 2. Patch MainActivity for status bar insets
          MAIN_ACT=$(find "$GEN" -name "MainActivity.kt" | head -1)
          echo "Found MainActivity: $MAIN_ACT"
          PACKAGE=$(head -1 "$MAIN_ACT" | sed 's/package //')
          cat > "$MAIN_ACT" << KOTLIN
          package $PACKAGE

          import android.os.Bundle
          import android.view.View
          import androidx.activity.enableEdgeToEdge
          import androidx.core.view.ViewCompat
          import androidx.core.view.WindowInsetsCompat

          class MainActivity : TauriActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  enableEdgeToEdge()
                  super.onCreate(savedInstanceState)

                  // Apply native padding for system bars (status bar + nav bar)
                  val rootView: View = findViewById(android.R.id.content)
                  ViewCompat.setOnApplyWindowInsetsListener(rootView) { v, insets ->
                      val systemBars = insets.getInsets(WindowInsetsCompat.Type.systemBars())
                      val imeVisible = insets.isVisible(WindowInsetsCompat.Type.ime())
                      val imeHeight = insets.getInsets(WindowInsetsCompat.Type.ime()).bottom
                      val bottomPadding = if (imeVisible) imeHeight else systemBars.bottom
                      v.setPadding(systemBars.left, systemBars.top, systemBars.right, bottomPadding)
                      insets
                  }
              }
          }
          KOTLIN
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "$MAIN_ACT"
          echo "=== Patched MainActivity.kt ==="
          cat "$MAIN_ACT"

          # 3. Add edge-to-edge dependency to build.gradle.kts
          GRADLE="$GEN/app/build.gradle.kts"
          sed -i '/dependencies {/a \    implementation("androidx.activity:activity-ktx:1.9.0")' "$GRADLE"

      - name: Build Android APK
        working-directory: desktop
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --apk --target aarch64

      - name: Sign APK
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          # Decode persistent keystore from secret
          echo "$ANDROID_KEYSTORE" | base64 -d > /tmp/release.keystore
          # Find the built APK
          APK=$(find desktop/src-tauri/gen/android -name "*.apk" | head -1)
          echo "Found APK: $APK"
          # Align and sign with persistent key
          BT=${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)
          ${BT}/zipalign -v 4 "$APK" /tmp/aligned.apk
          ${BT}/apksigner sign \
            --ks /tmp/release.keystore \
            --ks-key-alias musicseeker \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --key-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --out desktop/MusicSeeker.apk \
            /tmp/aligned.apk
          ${BT}/apksigner verify desktop/MusicSeeker.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicSeeker-Android
          path: desktop/MusicSeeker.apk

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/MusicSeeker.apk
