name: Build Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-1.0.0}"
          sed -i.bak "s/\"version\": \"1.0.0\"/\"version\": \"${VERSION}\"/" desktop/src-tauri/tauri.conf.json
          sed -i.bak "s/__APP_VERSION__/${VERSION}/" desktop/src-tauri/tauri.conf.json
          rm -f desktop/src-tauri/tauri.conf.json.bak
          echo "Building version: $VERSION"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: macos-rust-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: macos-rust-

      - name: Generate icons
        run: |
          cd desktop/src-tauri/icons
          # macOS has sips for PNG conversion, but it can't read SVG directly
          # Use rsvg-convert (brew install is cached by GitHub runners)
          if ! command -v rsvg-convert &>/dev/null; then
            brew install librsvg
          fi
          for size in 32 128 256 512 1024; do
            rsvg-convert -w $size -h $size icon.svg > icon_${size}.png
          done
          cp icon_512.png icon.png
          mkdir -p icon.iconset
          cp icon_32.png icon.iconset/icon_16x16@2x.png
          cp icon_128.png icon.iconset/icon_128x128.png
          cp icon_256.png icon.iconset/icon_128x128@2x.png
          cp icon_256.png icon.iconset/icon_256x256.png
          cp icon_512.png icon.iconset/icon_256x256@2x.png
          cp icon_512.png icon.iconset/icon_512x512.png
          cp icon_1024.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build Tauri app
        working-directory: desktop
        run: npx tauri build

      - name: Rename DMG
        run: |
          cd desktop/src-tauri/target/release/bundle/dmg
          for f in *.dmg; do mv "$f" "MusicSeeker.dmg"; done

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicSeeker-macOS
          path: desktop/src-tauri/target/release/bundle/dmg/MusicSeeker.dmg

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/release/bundle/dmg/MusicSeeker.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-1.0.0}"
          sed -i "s/\"version\": \"1.0.0\"/\"version\": \"${VERSION}\"/" desktop/src-tauri/tauri.conf.json
          sed -i "s/__APP_VERSION__/${VERSION}/" desktop/src-tauri/tauri.conf.json
          echo "Building version: $VERSION"

      - name: Setup toolchain
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: android-rust-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: android-rust-

      - name: Setup project
        run: |
          # Generate icons
          sudo apt-get install -y -qq librsvg2-bin
          cd desktop/src-tauri/icons
          for size in 48 72 96 144 192 512; do
            rsvg-convert -w $size -h $size icon.svg > icon_${size}.png
          done
          cp icon_512.png icon.png

      - name: Install dependencies & init
        working-directory: desktop
        run: |
          npm install
          npx tauri android init

      - name: Patch Android project
        run: |
          GEN="desktop/src-tauri/gen/android"
          ICONS="desktop/src-tauri/icons"
          RES="$GEN/app/src/main/res"

          # Icons
          cp "$ICONS/icon_48.png"  "$RES/mipmap-mdpi/ic_launcher.png"
          cp "$ICONS/icon_72.png"  "$RES/mipmap-hdpi/ic_launcher.png"
          cp "$ICONS/icon_96.png"  "$RES/mipmap-xhdpi/ic_launcher.png"
          cp "$ICONS/icon_144.png" "$RES/mipmap-xxhdpi/ic_launcher.png"
          cp "$ICONS/icon_192.png" "$RES/mipmap-xxxhdpi/ic_launcher.png"
          cp "$ICONS/icon_48.png"  "$RES/mipmap-mdpi/ic_launcher_round.png"
          cp "$ICONS/icon_72.png"  "$RES/mipmap-hdpi/ic_launcher_round.png"
          cp "$ICONS/icon_96.png"  "$RES/mipmap-xhdpi/ic_launcher_round.png"
          cp "$ICONS/icon_144.png" "$RES/mipmap-xxhdpi/ic_launcher_round.png"
          cp "$ICONS/icon_192.png" "$RES/mipmap-xxxhdpi/ic_launcher_round.png"

          # Permissions
          MANIFEST="$GEN/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \
              <uses-permission android:name="android.permission.INTERNET" />\
              <uses-permission android:name="android.permission.RECORD_AUDIO" />\
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\
              <uses-permission android:name="android.permission.WAKE_LOCK" />\
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK" />\
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST"
          # Register AudioService inside <application>
          sed -i '/<\/application>/i \
              <service android:name=".AudioService" android:exported="false" android:foregroundServiceType="mediaPlayback" />' "$MANIFEST"

          # MainActivity
          MAIN_ACT=$(find "$GEN" -name "MainActivity.kt" | head -1)
          PACKAGE=$(head -1 "$MAIN_ACT" | sed 's/package //')
          MAIN_DIR=$(dirname "$MAIN_ACT")
          cat > "$MAIN_ACT" << KOTLIN
          package $PACKAGE

          import android.content.Intent
          import android.os.Build
          import android.os.Bundle
          import android.os.Handler
          import android.os.Looper
          import android.view.View
          import android.webkit.JavascriptInterface
          import android.webkit.WebView
          import androidx.activity.enableEdgeToEdge
          import androidx.core.view.ViewCompat
          import androidx.core.view.WindowInsetsCompat
          import java.lang.ref.WeakReference

          class MainActivity : TauriActivity() {
              companion object {
                  var webViewRef: WeakReference<WebView>? = null
                  fun evaluateJs(js: String) {
                      webViewRef?.get()?.post { webViewRef?.get()?.evaluateJavascript(js, null) }
                  }
              }

              inner class AndroidBridge {
                  @JavascriptInterface
                  fun onPlay(title: String, artist: String) {
                      val intent = Intent(this@MainActivity, AudioService::class.java).apply {
                          action = "ACTION_PLAY"
                          putExtra("title", title)
                          putExtra("artist", artist)
                      }
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) startForegroundService(intent)
                      else startService(intent)
                  }

                  @JavascriptInterface
                  fun onPause() {
                      startService(Intent(this@MainActivity, AudioService::class.java).apply {
                          action = "ACTION_PAUSE"
                      })
                  }

                  @JavascriptInterface
                  fun onStop() {
                      startService(Intent(this@MainActivity, AudioService::class.java).apply {
                          action = "ACTION_STOP"
                      })
                  }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  enableEdgeToEdge()
                  super.onCreate(savedInstanceState)

                  // Status bar padding
                  val rootView: View = findViewById(android.R.id.content)
                  ViewCompat.setOnApplyWindowInsetsListener(rootView) { v, insets ->
                      val systemBars = insets.getInsets(WindowInsetsCompat.Type.systemBars())
                      val imeVisible = insets.isVisible(WindowInsetsCompat.Type.ime())
                      val imeHeight = insets.getInsets(WindowInsetsCompat.Type.ime()).bottom
                      val bottomPadding = if (imeVisible) imeHeight else systemBars.bottom
                      v.setPadding(systemBars.left, systemBars.top, systemBars.right, bottomPadding)
                      insets
                  }

                  // Request notification permission (API 33+)
                  if (Build.VERSION.SDK_INT >= 33) {
                      requestPermissions(arrayOf(android.Manifest.permission.POST_NOTIFICATIONS), 1)
                  }

                  // Wait for WebView, inject bridge
                  Handler(Looper.getMainLooper()).postDelayed({
                      try {
                          val webView = findWebView(window.decorView)
                          if (webView != null) {
                              webViewRef = WeakReference(webView)
                              webView.addJavascriptInterface(AndroidBridge(), "AndroidBridge")
                          }
                      } catch (e: Exception) {}
                  }, 2000)
              }

              override fun onDestroy() {
                  startService(Intent(this, AudioService::class.java).apply { action = "ACTION_STOP" })
                  super.onDestroy()
              }

              private fun findWebView(view: View): WebView? {
                  if (view is WebView) return view
                  if (view is android.view.ViewGroup) {
                      for (i in 0 until view.childCount) {
                          val found = findWebView(view.getChildAt(i))
                          if (found != null) return found
                      }
                  }
                  return null
              }
          }
          KOTLIN
          sed -i 's/^          //' "$MAIN_ACT"

          # AudioService.kt
          cat > "$MAIN_DIR/AudioService.kt" << KOTLIN
          package $PACKAGE

          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.PendingIntent
          import android.app.Service
          import android.content.Intent
          import android.content.pm.ServiceInfo
          import android.os.Build
          import android.os.IBinder
          import android.os.PowerManager
          import android.support.v4.media.MediaMetadataCompat
          import android.support.v4.media.session.MediaSessionCompat
          import android.support.v4.media.session.PlaybackStateCompat
          import androidx.core.app.NotificationCompat
          import androidx.media.app.NotificationCompat as MediaNotificationCompat

          class AudioService : Service() {
              private var mediaSession: MediaSessionCompat? = null
              private var wakeLock: PowerManager.WakeLock? = null
              private var currentTitle = ""
              private var currentArtist = ""
              private val CHANNEL_ID = "audio_playback"
              private val NOTIFICATION_ID = 1

              override fun onCreate() {
                  super.onCreate()
                  createNotificationChannel()
                  mediaSession = MediaSessionCompat(this, "MusicSeeker").apply {
                      setCallback(object : MediaSessionCompat.Callback() {
                          override fun onPlay() { MainActivity.evaluateJs("window._androidMediaAction('play')") }
                          override fun onPause() { MainActivity.evaluateJs("window._androidMediaAction('pause')") }
                          override fun onSkipToNext() { MainActivity.evaluateJs("window._androidMediaAction('next')") }
                          override fun onSkipToPrevious() { MainActivity.evaluateJs("window._androidMediaAction('prev')") }
                      })
                      isActive = true
                  }
                  val pm = getSystemService(POWER_SERVICE) as PowerManager
                  wakeLock = pm.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, "MusicSeeker::Audio").apply { acquire() }
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  when (intent?.action) {
                      "ACTION_PLAY" -> {
                          currentTitle = intent.getStringExtra("title") ?: currentTitle
                          currentArtist = intent.getStringExtra("artist") ?: currentArtist
                          updateNotification(true)
                      }
                      "ACTION_PAUSE" -> updateNotification(false)
                      "ACTION_STOP" -> {
                          stopForeground(STOP_FOREGROUND_REMOVE)
                          stopSelf()
                      }
                  }
                  return START_NOT_STICKY
              }

              override fun onBind(intent: Intent?): IBinder? = null

              override fun onDestroy() {
                  mediaSession?.release()
                  wakeLock?.let { if (it.isHeld) it.release() }
                  super.onDestroy()
              }

              private fun createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val ch = NotificationChannel(CHANNEL_ID, "Audio Playback", NotificationManager.IMPORTANCE_LOW).apply {
                          description = "Background audio playback"
                          setSound(null, null)
                      }
                      (getSystemService(NOTIFICATION_SERVICE) as NotificationManager).createNotificationChannel(ch)
                  }
              }

              private fun updateNotification(isPlaying: Boolean) {
                  mediaSession?.setMetadata(MediaMetadataCompat.Builder()
                      .putString(MediaMetadataCompat.METADATA_KEY_TITLE, currentTitle)
                      .putString(MediaMetadataCompat.METADATA_KEY_ARTIST, currentArtist)
                      .build())
                  mediaSession?.setPlaybackState(PlaybackStateCompat.Builder()
                      .setState(
                          if (isPlaying) PlaybackStateCompat.STATE_PLAYING else PlaybackStateCompat.STATE_PAUSED,
                          0L, 1f
                      )
                      .setActions(
                          PlaybackStateCompat.ACTION_PLAY or PlaybackStateCompat.ACTION_PAUSE
                          or PlaybackStateCompat.ACTION_SKIP_TO_NEXT or PlaybackStateCompat.ACTION_SKIP_TO_PREVIOUS
                      )
                      .build())

                  val notification = NotificationCompat.Builder(this, CHANNEL_ID)
                      .setSmallIcon(android.R.drawable.ic_media_play)
                      .setContentTitle(currentTitle)
                      .setContentText(currentArtist)
                      .setOngoing(isPlaying)
                      .setSilent(true)
                      .setStyle(MediaNotificationCompat.MediaStyle()
                          .setMediaSession(mediaSession?.sessionToken)
                          .setShowActionsInCompactView(0, 1, 2))
                      .addAction(NotificationCompat.Action(android.R.drawable.ic_media_previous, "Prev",
                          androidx.media.session.MediaButtonReceiver.buildMediaButtonPendingIntent(this, PlaybackStateCompat.ACTION_SKIP_TO_PREVIOUS)))
                      .addAction(NotificationCompat.Action(
                          if (isPlaying) android.R.drawable.ic_media_pause else android.R.drawable.ic_media_play,
                          if (isPlaying) "Pause" else "Play",
                          androidx.media.session.MediaButtonReceiver.buildMediaButtonPendingIntent(this,
                              if (isPlaying) PlaybackStateCompat.ACTION_PAUSE else PlaybackStateCompat.ACTION_PLAY)))
                      .addAction(NotificationCompat.Action(android.R.drawable.ic_media_next, "Next",
                          androidx.media.session.MediaButtonReceiver.buildMediaButtonPendingIntent(this, PlaybackStateCompat.ACTION_SKIP_TO_NEXT)))
                      .build()

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      startForeground(NOTIFICATION_ID, notification, ServiceInfo.FOREGROUND_SERVICE_TYPE_MEDIA_PLAYBACK)
                  } else {
                      startForeground(NOTIFICATION_ID, notification)
                  }
              }
          }
          KOTLIN
          sed -i 's/^          //' "$MAIN_DIR/AudioService.kt"

          # Dependencies
          GRADLE="$GEN/app/build.gradle.kts"
          sed -i '/dependencies {/a \    implementation("androidx.activity:activity-ktx:1.9.0")' "$GRADLE"
          sed -i '/dependencies {/a \    implementation("androidx.media:media:1.7.0")' "$GRADLE"

      - name: Build Android APK
        working-directory: desktop
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --apk --target aarch64

      - name: Sign APK
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE" | base64 -d > /tmp/release.keystore
          APK=$(find desktop/src-tauri/gen/android -name "*.apk" | head -1)
          BT=${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)
          ${BT}/zipalign -v 4 "$APK" /tmp/aligned.apk
          ${BT}/apksigner sign \
            --ks /tmp/release.keystore --ks-key-alias musicseeker \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --key-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --out desktop/MusicSeeker.apk /tmp/aligned.apk
          ${BT}/apksigner verify desktop/MusicSeeker.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicSeeker-Android
          path: desktop/MusicSeeker.apk

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/MusicSeeker.apk
