name: Build Desktop App

on:
  workflow_dispatch:
  push:
    paths:
      - 'desktop/**'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-action/setup@v1

      - name: Generate icons from SVG
        run: |
          brew install librsvg
          cd desktop/src-tauri/icons
          # Generate PNG at various sizes
          for size in 32 128 256 512 1024; do
            rsvg-convert -w $size -h $size icon.svg > icon_${size}.png
          done
          cp icon_512.png icon.png
          # Generate .icns for macOS
          mkdir -p icon.iconset
          cp icon_32.png icon.iconset/icon_16x16@2x.png
          cp icon_128.png icon.iconset/icon_128x128.png
          cp icon_256.png icon.iconset/icon_128x128@2x.png
          cp icon_256.png icon.iconset/icon_256x256.png
          cp icon_512.png icon.iconset/icon_256x256@2x.png
          cp icon_512.png icon.iconset/icon_512x512.png
          cp icon_1024.png icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build Tauri app
        working-directory: desktop
        run: npx tauri build

      - name: Rename DMG
        run: |
          cd desktop/src-tauri/target/release/bundle/dmg
          for f in *.dmg; do mv "$f" "MusicSeeker.dmg"; done

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicSeeker-macOS
          path: desktop/src-tauri/target/release/bundle/dmg/MusicSeeker.dmg

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/release/bundle/dmg/MusicSeeker.dmg
